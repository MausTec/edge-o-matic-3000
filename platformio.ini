; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; Regarding -Wno-error=discarded-qualifiers: wpa_supplicant assigns const strings
; to non-const pointers. Not our bug to fix.

[platformio]
monitor_dir = ./bin/pio/monitor
default_envs = eom3k

[env]
extra_scripts =
	bin/pio/split_c_flags.py

[esp32_base]
platform = espressif32 @ 5.3.0
board = esp32dev
debug_tool = esp-prog
framework = espidf
; Pin ESP-IDF to v4.4.6 — tested and verified
platform_packages = framework-espidf @ 3.40406.240122
board_build.partitions = min_spiffs.csv
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters =
	screenshot
	hexfile
	esp32_exception_decoder
build_flags =
	-Wno-unused-variable
	-Wno-unused-function
	-Wno-write-strings
	-Wno-error=parentheses
	-Wno-error=missing-braces
	-Werror=incompatible-pointer-types
	-Wno-error=discarded-qualifiers
	-Wno-override-init
	!python bin/pio/build_flags.py

[env:eom3k]
extends = esp32_base
; Release build. Default. Size-optimized.
build_flags = ${esp32_base.build_flags}
extra_scripts =
	${env.extra_scripts}
	post:lib/mt-actions/scripts/gen_plugin_api.py

[env:eom3k-debug]
extends = esp32_base
; Debug build. Verbose logging, debug symbols, extra assertions.
build_flags =
	${esp32_base.build_flags}
	-DEOM_DEBUG=1

[env:eom3k-wasm]
extends = esp32_base
; Internal WASM app development. Release flags + applications menu enabled.
build_flags =
	${esp32_base.build_flags}
	-DEOM_WASM_APPS_ENABLED=1

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_src_filter = -<*>
test_filter = test_native
build_flags =
	-std=gnu11
	-I include
	-D UNITY_INCLUDE_DOUBLE

[env:test_esp32]
extends = esp32_base
test_framework = unity
test_build_src = no
build_src_filter = -<*>
test_filter = test_esp32