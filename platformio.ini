; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
monitor_dir = ./bin/pio/monitor
default_envs = esp32dev

[common]
build_flags =
	-Wno-unused-variable
	-Wno-unused-function
	-Wno-write-strings
	-Wno-error=parentheses
	-Wno-error=missing-braces
	-Werror=incompatible-pointer-types
	-Wno-override-init

[esp_defaults]
platform = espressif32 @ 5.3.0
board = esp32dev
framework = espidf
; Pin ESP-IDF to v4.4.6 for sdkconfig compatibility
platform_packages = framework-espidf @ 3.40406.240122
board_build.partitions = min_spiffs.csv

[env:esp32dev]
platform = ${esp_defaults.platform}
board = ${esp_defaults.board}
debug_tool = esp-prog
framework = ${esp_defaults.framework}
platform_packages = ${esp_defaults.platform_packages}
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
monitor_filters = 
	screenshot
	hexfile
	esp32_exception_decoder
board_build.partitions = ${esp_defaults.board_build.partitions}
build_flags =
	${common.build_flags}
	!python bin/pio/build_flags.py
extra_scripts =
	bin/pio/split_c_flags.py
	post:bin/pio/gen_plugin_api.py

[env:native]
platform = native
test_framework = unity
test_build_src = no
build_src_filter = -<*>
test_filter = test_native
build_flags =
	-std=gnu11
	-I include
	-D UNITY_INCLUDE_DOUBLE

[env:test_esp32]
platform = ${esp_defaults.platform}
board = ${esp_defaults.board}
framework = ${esp_defaults.framework}
platform_packages = ${esp_defaults.platform_packages}
board_build.partitions = ${esp_defaults.board_build.partitions}
test_framework = unity
test_build_src = no
build_src_filter = -<*>
test_filter = test_esp32